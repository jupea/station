name: build

on:
  push:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKER_REPO }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Create Docker Hub Repository
      env:
        DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        DOCKER_REPO: ${{ vars.DOCKER_REPO }}
      run: bash scripts/create_dockerhub_repo.sh
    
    - uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - uses: docker/setup-buildx-action@v4
    
    - name: compute next tag
      id: tag
      run: |
        sudo apt-get update && sudo apt-get install -y skopeo
        last=$(skopeo list-tags docker://docker.io/${{ env.IMAGE_NAME }} | \
               jq -r '.Tags[] | select(test("^v[0-9]+$")) | ltrimstr("v")' | sort -n | tail -n1)
        if [ -z $last ] ; then
          last="0"
        fi
        echo "tag=v$((last+1))" >>"$GITHUB_OUTPUT"

    - uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy
      env:
        IMAGE_TAG: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        DEPLOY_HOOK: ${{ secrets.DEPLOY_HOOK }}
      run: bash -xc "curl ${DEPLOY_HOOK}&imgURL=${REGISTRY}/${IMAGE_TAG}"
