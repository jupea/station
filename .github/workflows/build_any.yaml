name: build any

on:
  workflow_dispatch:
    inputs:
      REPO_URL:
        description: 'Full git URL to clone'
        required: true
      REPO_NAME:
        description: 'Name used as the Docker Hub repo part'
        required: true


env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.REPO_NAME }}



jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone external repository
      run: |
        git clone "${{ inputs.REPO_URL }}" .

    - name: Create Docker Hub Repository
      env:
        DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        DOCKER_REPO: ${{ inputs.REPO_NAME }}
      run: |
        #!/bin/bash

        set -euo pipefail


        # Validate required environment variables
        if [[ -z "${DOCKERHUB_USERNAME:-}" ]]; then
          echo "ERROR: DOCKERHUB_USERNAME environment variable is not set" >&2
          exit 1
        fi

        if [[ -z "${DOCKERHUB_TOKEN:-}" ]]; then
          echo "ERROR: DOCKERHUB_TOKEN environment variable is not set" >&2
          exit 1
        fi

        if [[ -z "${DOCKER_REPO:-}" ]]; then
          echo "ERROR: DOCKER_REPO environment variable is not set" >&2
          exit 1
        fi

        NAMESPACE="${DOCKERHUB_USERNAME}"
        REPOSITORY="${DOCKER_REPO}"
        REGISTRY_URL="https://hub.docker.com/v2"

        # Create Bearer token from username and token
        AUTH_HEADER=$(echo -n "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64 -w 0)

        echo "Checking if repository '${NAMESPACE}/${REPOSITORY}' exists..."

        # Check if repository exists using HEAD request
        if curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer ${AUTH_HEADER}" \
          "https://hub.docker.com/v2/namespaces/${NAMESPACE}/repositories/${REPOSITORY}/tags" \
          | grep -q "404"; then
          
          echo "Repository does not exist. Creating '${NAMESPACE}/${REPOSITORY}'..."
          
          # Create the repository
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${AUTH_HEADER}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"${REPOSITORY}\",
              \"namespace\": \"${NAMESPACE}\",
              \"description\": \"Docker repository for ${REPOSITORY}\",
              \"full_description\": \"This is a Docker repository for ${REPOSITORY} application.\",
              \"registry\": \"docker.io\",
              \"is_private\": false
            }" \
            "${REGISTRY_URL}/namespaces/${NAMESPACE}/repositories")
          
          # Extract HTTP status code (last line)
          HTTP_CODE=$(echo "${RESPONSE}" | tail -n 1)
          # Extract response body (all but last line)
          RESPONSE_BODY=$(echo "${RESPONSE}" | head -n -1)
          
          if [[ "${HTTP_CODE}" == "201" ]]; then
            echo "✓ Repository '${NAMESPACE}/${REPOSITORY}' created successfully!"
            echo "Repository details:"
            echo "${RESPONSE_BODY}" | jq '.' 2>/dev/null || echo "${RESPONSE_BODY}"
          else
            echo "✗ Failed to create repository. HTTP Status: ${HTTP_CODE}" >&2
            echo "Response: ${RESPONSE_BODY}" >&2
            exit 1
          fi
        else
          echo "✓ Repository '${NAMESPACE}/${REPOSITORY}' already exists."
        fi


    - uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - uses: docker/setup-buildx-action@v4

    - name: compute next tag
      id: tag
      run: |
        sudo apt-get update && sudo apt-get install -y skopeo
        last=$(skopeo list-tags docker://docker.io/${{ env.IMAGE_NAME }} | \
               jq -r '.Tags[] | select(test("^v[0-9]+$")) | ltrimstr("v")' | sort -n | tail -n1)
        if [ -z $last ] ; then
          last="0"
        fi
        echo "tag=v$((last+1))" >>"$GITHUB_OUTPUT"

    - uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy
      env:
        IMAGE_TAG: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        DEPLOY_HOOK: ${{ secrets.DEPLOY_HOOK_WEBNOTE }}
      run: bash -xc "curl ${DEPLOY_HOOK}\&imgURL=${REGISTRY}/${IMAGE_TAG}"
